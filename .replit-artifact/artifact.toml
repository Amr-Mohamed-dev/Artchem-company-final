kind = "web"
previewPath = "/"
title = "ARTCHEM Corporate Website"
version = "1.0.0"
id = "artifacts/artchem"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23126

[services.development]
run = "pnpm --filter @workspace/artchem run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/artchem", "run", "build" ]
publicDir = "artifacts/artchem/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23126"
BASE_PATH = "/"
